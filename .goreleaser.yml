version: 2
project_name: workflow-plugin-signal

before:
  hooks:
    - go mod tidy
    - >-
      sh -c "sed -i.bak 's/\"version\": \"[^\"]*\"/\"version\": \"{{ .Version }}\"/' plugin.json && sed -i.bak 's|releases/download/v[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*|releases/download/v{{ .Version }}|g' plugin.json && rm -f plugin.json.bak"

builds:
  - id: workflow-plugin-signal
    binary: workflow-plugin-signal
    main: ./cmd/workflow-plugin-signal
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/GoCodeAlone/workflow-plugin-signal/internal.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: archive
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    files:
      - LICENSE
      - plugin.json
      - plugin.contracts.json

checksum:
  name_template: checksums.txt

release:
  draft: false
