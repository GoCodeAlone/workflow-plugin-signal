version: 2

builds:
  - id: plugin
    binary: workflow-plugin-signal
    main: ./cmd/workflow-plugin-signal
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/GoCodeAlone/workflow-plugin-signal/internal.Version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    files:
      - plugin.json

checksum:
  name_template: checksums.txt

release:
  draft: false
