plugin_dir: ../../.wfctl/test-plugins
yaml: |
  modules:
    - name: alice_identity
      type: signal.identity_store
      config:
        identity_ref: alice
        local_id: alice@example.test
        device_id: 1
        registration_id: 1001
    - name: bob_identity
      type: signal.identity_store
      config:
        identity_ref: bob
        local_id: bob@example.test
        device_id: 1
        registration_id: 2002
    - name: service_custody
      type: signal.key_custody
      config:
        custody_ref: custody://signal/service-test/device-1
        account_ref: account://signal/service-test
        non_exportable_key_ref: kms://signal/service-test/device-1
    - name: service_account
      type: signal.account_ref
      config:
        account_ref: account://signal/service-test
        device_ref: device://signal/service-test/device-1
        custody_ref: custody://signal/service-test/device-1
        credential_ref: secret://signal/service-test/credential
        consent_ref: consent://signal/service-test/consent
        audit_ref: audit://signal/service-test/audit
    - name: custody_store
      type: signal.custody_store
      config:
        backend_id: local-test
        backend: test_file
        storage_path: .wfctl/signal-pipeline-custody
        kek_ref: test://signal/kek
        kek_version: v1
        schema_version: 1
        allow_test_backend: true

  pipelines:
    signal-e2e:
      steps:
        - name: prepare_bob
          type: step.signal_session_prepare
          config:
            identity_ref: bob
        - name: encrypt_input
          type: step.set
          config:
            values:
              remote_id: bob@example.test
              remote_device_id: 1
              plaintext: cHJpdmF0ZSB3b3JrZmxvdyBtZXNzYWdl
              remote_bundle:
                identity_ref: "{{ index .steps \"prepare_bob\" \"bundle\" \"identity_ref\" }}"
                local_id: "{{ index .steps \"prepare_bob\" \"bundle\" \"local_id\" }}"
                device_id: "{{ index .steps \"prepare_bob\" \"bundle\" \"device_id\" }}"
                registration_id: "{{ index .steps \"prepare_bob\" \"bundle\" \"registration_id\" }}"
                pre_key_id: "{{ index .steps \"prepare_bob\" \"bundle\" \"pre_key_id\" }}"
                pre_key: "{{ index .steps \"prepare_bob\" \"bundle\" \"pre_key\" }}"
                signed_pre_key_id: "{{ index .steps \"prepare_bob\" \"bundle\" \"signed_pre_key_id\" }}"
                signed_pre_key: "{{ index .steps \"prepare_bob\" \"bundle\" \"signed_pre_key\" }}"
                signed_pre_key_signature: "{{ index .steps \"prepare_bob\" \"bundle\" \"signed_pre_key_signature\" }}"
                kyber_pre_key_id: "{{ index .steps \"prepare_bob\" \"bundle\" \"kyber_pre_key_id\" }}"
                kyber_pre_key: "{{ index .steps \"prepare_bob\" \"bundle\" \"kyber_pre_key\" }}"
                kyber_pre_key_signature: "{{ index .steps \"prepare_bob\" \"bundle\" \"kyber_pre_key_signature\" }}"
                identity_key: "{{ index .steps \"prepare_bob\" \"bundle\" \"identity_key\" }}"
        - name: encrypt
          type: step.signal_encrypt
          config:
            identity_ref: alice
        - name: decrypt_input
          type: step.set
          config:
            values:
              principal: bob-user
              envelope:
                sender_id: "{{ index .steps \"encrypt\" \"envelope\" \"sender_id\" }}"
                sender_device_id: "{{ index .steps \"encrypt\" \"envelope\" \"sender_device_id\" }}"
                recipient_id: "{{ index .steps \"encrypt\" \"envelope\" \"recipient_id\" }}"
                recipient_device_id: "{{ index .steps \"encrypt\" \"envelope\" \"recipient_device_id\" }}"
                message_type: "{{ index .steps \"encrypt\" \"envelope\" \"message_type\" }}"
                ciphertext: "{{ index .steps \"encrypt\" \"envelope\" \"ciphertext\" }}"
        - name: decrypt
          type: step.signal_decrypt
          config:
            identity_ref: bob
            required_principal: bob-user
      on_error: stop
    signal-service-fake:
      steps:
        - name: username_input
          type: step.set
          config:
            values:
              idempotency_key: "{{ .idempotency_prefix }}-username"
              username: "{{ .username }}"
        - name: username_reserve
          type: step.signal_service_test_username_reserve
          config:
            account_ref: account://signal/service-test
        - name: backup_upload_input
          type: step.set
          config:
            values:
              idempotency_key: "{{ .idempotency_prefix }}-backup-upload"
              backup_ref: "{{ .backup_ref }}"
        - name: backup_upload
          type: step.signal_service_test_backup_upload
          config:
            account_ref: account://signal/service-test
        - name: backup_download_input
          type: step.set
          config:
            values:
              idempotency_key: "{{ .idempotency_prefix }}-backup-download"
              backup_id: "{{ .backup_id }}"
              challenge_ref: "{{ .backup_challenge_ref }}"
        - name: backup_download
          type: step.signal_service_test_backup_download
          config:
            account_ref: account://signal/service-test
      on_error: stop
    signal-service-custody-readiness:
      steps:
        - name: prepare_input
          type: step.set
          config:
            values:
              idempotency_key: "{{ .request_id }}"
              recipient_ref: "{{ .recipient_ref }}"
              payload_ref: "{{ .payload_ref }}"
        - name: prepare_send
          type: step.signal_service_send_prepare
          config:
            account_ref: account://signal/service-test
        - name: custody_summary
          type: step.set
          config:
            values:
              custody_attested: "{{ index .steps \"prepare_send\" \"custody_attested\" }}"
              custody_attestation_ref: "{{ index .steps \"prepare_send\" \"custody_attestation_ref\" }}"
              account_ref: "{{ index .steps \"prepare_send\" \"envelope\" \"account_ref\" }}"
              device_ref: "{{ index .steps \"prepare_send\" \"envelope\" \"device_ref\" }}"
              custody_ref: "{{ index .steps \"prepare_send\" \"envelope\" \"custody_ref\" }}"
              credential_ref: "{{ index .steps \"prepare_send\" \"envelope\" \"credential_ref\" }}"
              non_exportable_key_ref: "{{ index .steps \"prepare_send\" \"envelope\" \"non_exportable_key_ref\" }}"
              recipient_ref: "{{ index .steps \"prepare_send\" \"envelope\" \"recipient_ref\" }}"
              payload_ref: "{{ index .steps \"prepare_send\" \"envelope\" \"payload_ref\" }}"
      on_error: stop
    signal-custody-round-trip:
      steps:
        - name: create_input
          type: step.set
          config:
            values:
              account_ref: "account://signal/{{ .principal }}"
              device_ref: "device://signal/{{ .principal }}/device-1"
              material_refs:
                - "secret://signal/{{ .principal }}/identity-key"
              idempotency_key: "{{ .principal }}-device-1"
              requested_at_unix: 1783000000
        - name: create
          type: step.signal_custody_create
          config:
            store_ref: custody_store
        - name: attest_input
          type: step.set
          config:
            values:
              custody_ref: "{{ index .steps \"create\" \"custody_ref\" }}"
              audience_ref: "workflow://signal-custody/{{ .environment }}/{{ .principal }}"
              requested_at_unix: 1783000060
        - name: attest
          type: step.signal_custody_attest
          config:
            store_ref: custody_store
        - name: rotate_input
          type: step.set
          config:
            values:
              custody_ref: "{{ index .steps \"create\" \"custody_ref\" }}"
              new_kek_version: v2
              requested_at_unix: 1783000120
        - name: rotate
          type: step.signal_custody_rotate
          config:
            store_ref: custody_store
        - name: export_request_input
          type: step.set
          config:
            values:
              custody_ref: "{{ index .steps \"create\" \"custody_ref\" }}"
              requester_ref: "principal://{{ .principal }}"
              reason_ref: "ticket://signal-custody/{{ .principal }}/export-review"
              requested_at_unix: 1783000180
        - name: export_request
          type: step.signal_custody_export_request
          config:
            store_ref: custody_store
      on_error: stop
tests:
  signal-session-roundtrip:
    trigger:
      type: pipeline
      name: signal-e2e
    assertions:
      - step: prepare_bob
        executed: true
      - step: encrypt
        executed: true
      - step: decrypt
        output:
          plaintext: cHJpdmF0ZSB3b3JrZmxvdyBtZXNzYWdl
  signal-service-fake-username-backup:
    trigger:
      type: pipeline
      name: signal-service-fake
      data:
        idempotency_prefix: caller-a
        username: caller_a.42
        backup_ref: backup://signal/caller-a/snapshot-1
        backup_id: backup-id://signal/caller-a/snapshot-1
        backup_challenge_ref: challenge://signal/caller-a/backup-download
    assertions:
      - step: username_reserve
        output:
          account_ref: account://signal/service-test
          status: accepted
          request_id: caller-a-username
          credential_ref: secret://signal/service-test/credential
      - step: backup_upload
        output:
          account_ref: account://signal/service-test
          status: accepted
          request_id: caller-a-backup-upload
      - step: backup_download
        output:
          account_ref: account://signal/service-test
          status: challenge_required
          request_id: caller-a-backup-download
          challenge_ref: challenge://signal/caller-a/backup-download
  signal-service-custody-readiness:
    trigger:
      type: pipeline
      name: signal-service-custody-readiness
      data:
        request_id: caller-b-send
        recipient_ref: recipient://signal/caller-b
        payload_ref: payload://signal/caller-b/ciphertext-1
    assertions:
      - step: prepare_send
        output:
          custody_attested: true
          custody_attestation_ref: attest://signal/custody/custody-signal-service-test-device-1
      - step: custody_summary
        output:
          custody_attested: "true"
          custody_attestation_ref: attest://signal/custody/custody-signal-service-test-device-1
          account_ref: account://signal/service-test
          device_ref: device://signal/service-test/device-1
          custody_ref: custody://signal/service-test/device-1
          credential_ref: secret://signal/service-test/credential
          non_exportable_key_ref: kms://signal/service-test/device-1
          recipient_ref: recipient://signal/caller-b
          payload_ref: payload://signal/caller-b/ciphertext-1
  signal-custody-round-trip:
    trigger:
      type: pipeline
      name: signal-custody-round-trip
      data:
        principal: user-a
        environment: development
    assertions:
      - step: create
        output:
          custody_ref: custody://user-a-device-1
      - step: attest
        output:
          custody_ref: custody://user-a-device-1
      - step: rotate
        output:
          custody_ref: custody://user-a-device-1
      - step: export_request
        output:
          custody_ref: custody://user-a-device-1
          status: approval_required
