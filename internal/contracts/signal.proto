syntax = "proto3";

package workflow.plugins.signal.v1;

option go_package = "github.com/GoCodeAlone/workflow-plugin-signal/internal/contracts";

message IdentityStoreConfig {
  string identity_ref = 1;
  string local_id = 2;
  uint32 device_id = 3;
  uint32 registration_id = 4;
}

message SpaceConfig {
  string space_ref = 1;
  string identity_ref = 2;
  string room_ref = 3;
  string eventbus_ref = 4;
}

message EnvelopeTriggerConfig {
  string source_ref = 1;
  string identity_ref = 2;
}

message SignalFingerprintConfig {
  uint32 version = 1;
  uint32 iterations = 2;
}

message SignalFingerprintInput {
  string local_id = 1;
  string local_key = 2;
  string remote_id = 3;
  string remote_key = 4;
  uint32 version = 5;
  uint32 iterations = 6;
}

message SignalFingerprintOutput {
  string display = 1;
  string scannable_hex = 2;
}

message SessionPrepareConfig {
  string identity_ref = 1;
}

message SessionPrepareInput {
  string identity_ref = 1;
}

message PreKeyBundle {
  string identity_ref = 1;
  string local_id = 2;
  uint32 device_id = 3;
  uint32 registration_id = 4;
  uint32 pre_key_id = 5;
  string pre_key = 6;
  uint32 signed_pre_key_id = 7;
  string signed_pre_key = 8;
  string signed_pre_key_signature = 9;
  uint32 kyber_pre_key_id = 10;
  string kyber_pre_key = 11;
  string kyber_pre_key_signature = 12;
  string identity_key = 13;
}

message SessionPrepareOutput {
  PreKeyBundle bundle = 1;
}

message SignalEncryptConfig {
  string identity_ref = 1;
}

message SignalEncryptInput {
  string identity_ref = 1;
  string remote_id = 2;
  uint32 remote_device_id = 3;
  PreKeyBundle remote_bundle = 4;
  bytes plaintext = 5;
}

message SignalEnvelope {
  string sender_id = 1;
  uint32 sender_device_id = 2;
  string recipient_id = 3;
  uint32 recipient_device_id = 4;
  string message_type = 5;
  bytes ciphertext = 6;
}

message SignalEncryptOutput {
  SignalEnvelope envelope = 1;
}

message SignalDecryptConfig {
  string identity_ref = 1;
  string required_principal = 2;
}

message SignalDecryptInput {
  string identity_ref = 1;
  string principal = 2;
  SignalEnvelope envelope = 3;
}

message SignalDecryptOutput {
  bool denied = 1;
  string error = 2;
  bytes plaintext = 3;
}

message AccountKeysConfig {
  string entropy_pool = 1;
  bytes aci = 2;
  string pin = 3;
  bytes pin_salt = 4;
  string pin_salt_username = 5;
  uint64 pin_salt_group_id = 6;
}

message AccountKeysInput {
  string entropy_pool = 1;
  bytes aci = 2;
  string pin = 3;
  bytes pin_salt = 4;
  string pin_salt_username = 5;
  uint64 pin_salt_group_id = 6;
}

message AccountKeysOutput {
  string entropy_pool = 1;
  bytes svr_key = 2;
  bytes backup_key = 3;
  bytes backup_id = 4;
  bytes pin_salt = 5;
  bytes pin_access_key = 6;
  bytes pin_encryption_key = 7;
}

message UsernameLinkCreateConfig {
  string username = 1;
  bytes entropy = 2;
}

message UsernameLinkCreateInput {
  string username = 1;
  bytes entropy = 2;
}

message UsernameLinkCreateOutput {
  bytes entropy = 1;
  bytes encrypted_username = 2;
  bytes link_buffer = 3;
}

message UsernameLinkDecryptConfig {
  bytes entropy = 1;
}

message UsernameLinkDecryptInput {
  bytes entropy = 1;
  bytes encrypted_username = 2;
  bytes link_buffer = 3;
}

message UsernameLinkDecryptOutput {
  string username = 1;
}

message OfficialServiceBoundaryConfig {
  string mode = 1;
  string upstream_tag = 2;
  string descriptor_checksum = 3;
  string account_secret_ref = 4;
  string egress_policy_ref = 5;
}

message KeyCustodyConfig {
  string custody_ref = 1;
  string account_ref = 2;
  repeated string secret_refs = 3;
  string non_exportable_key_ref = 4;
  bool allow_exportable_secret_refs = 5;
}

message PersistentCustodyConfig {
  string custody_ref = 1;
  string account_ref = 2;
  string backend = 3;
  string storage_path = 4;
  string key_handle = 5;
  string host_secret_ref = 6;
  bool allow_test_backend = 7;
}

message AccountRefConfig {
  string account_ref = 1;
  string device_ref = 2;
  string custody_ref = 3;
  string credential_ref = 4;
  string consent_ref = 5;
  string audit_ref = 6;
}

message ServiceContractCheckConfig {
  string mode = 1;
}

message ServiceContractCheckInput {
  string mode = 1;
}

message ServiceContractCheckOutput {
  string mode = 1;
  string upstream_tag = 2;
  string descriptor_checksum = 3;
  repeated string selected_domains = 4;
  bool live_service_disabled = 5;
}

message ServiceComplianceCheckConfig {
  string mode = 1;
  repeated string requested_actions = 2;
}

message ServiceComplianceCheckInput {
  string mode = 1;
  repeated string requested_actions = 2;
}

message ServiceComplianceCheckOutput {
  string mode = 1;
  bool approved = 2;
  bool live_service_disabled = 3;
  repeated string blocked_actions = 4;
  repeated string required_approvals = 5;
  repeated string deferred_domains = 6;
  string upstream_tag = 7;
  string descriptor_checksum = 8;
  string manifest_digest = 9;
  repeated string selected_domains = 10;
}

message ServicePolicyCheckConfig {
  string mode = 1;
  repeated string approvals = 2;
  repeated string requested_actions = 3;
}

message ServicePolicyCheckInput {
  string mode = 1;
  repeated string approvals = 2;
  repeated string requested_actions = 3;
}

message ServicePolicyCheckOutput {
  string mode = 1;
  bool approved = 2;
  bool live_service_disabled = 3;
  bool live_transport_allowed = 4;
  repeated string required_approvals = 5;
  repeated string missing_approvals = 6;
  repeated string blocked_actions = 7;
}

message ServiceTestRegisterConfig {
  string account_ref = 1;
  bool expired_credentials = 2;
}

message ServiceTestRegisterInput {
  string account_ref = 1;
  string device_ref = 2;
  string custody_ref = 3;
  string idempotency_key = 4;
  string username = 5;
  string consent_ref = 6;
  string audit_ref = 7;
  string credential_ref = 8;
  string non_exportable_key_ref = 9;
  string challenge_ref = 10;
  bool expired_credentials = 11;
}

message ServiceTestLinkDeviceConfig {
  string account_ref = 1;
  bool expired_credentials = 2;
}

message ServiceTestLinkDeviceInput {
  string account_ref = 1;
  string device_ref = 2;
  string custody_ref = 3;
  string idempotency_key = 4;
  string link_code_ref = 5;
  string consent_ref = 6;
  string audit_ref = 7;
  string credential_ref = 8;
  string non_exportable_key_ref = 9;
  string challenge_ref = 10;
  bool expired_credentials = 11;
}

message ServiceTestSendConfig {
  string account_ref = 1;
  bool expired_credentials = 2;
}

message ServiceTestSendInput {
  string account_ref = 1;
  string device_ref = 2;
  string custody_ref = 3;
  string idempotency_key = 4;
  string recipient_ref = 5;
  string payload_ref = 6;
  string consent_ref = 7;
  string audit_ref = 8;
  string credential_ref = 9;
  string non_exportable_key_ref = 10;
  string challenge_ref = 11;
  bool expired_credentials = 12;
}

message ServiceTestReceiveConfig {
  string account_ref = 1;
  bool expired_credentials = 2;
}

message ServiceTestReceiveInput {
  string account_ref = 1;
  string device_ref = 2;
  string custody_ref = 3;
  string idempotency_key = 4;
  string cursor_ref = 5;
  string consent_ref = 6;
  string audit_ref = 7;
  string credential_ref = 8;
  string non_exportable_key_ref = 9;
  string challenge_ref = 10;
  bool expired_credentials = 11;
}

message ServiceTestOutput {
  string account_ref = 1;
  string device_ref = 2;
  string request_id = 3;
  string status = 4;
  string challenge_ref = 5;
  map<string, string> secret_refs = 6;
  string credential_ref = 7;
  string audit_ref = 8;
}

message ServiceEnvelopeTriggerConfig {
  string source_ref = 1;
  string boundary_ref = 2;
}
