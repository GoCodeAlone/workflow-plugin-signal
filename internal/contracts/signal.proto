syntax = "proto3";

package workflow.plugins.signal.v1;

option go_package = "github.com/GoCodeAlone/workflow-plugin-signal/internal/contracts";

message IdentityStoreConfig {
  string identity_ref = 1;
  string local_id = 2;
  uint32 device_id = 3;
  uint32 registration_id = 4;
}

message SpaceConfig {
  string space_ref = 1;
  string identity_ref = 2;
  string room_ref = 3;
  string eventbus_ref = 4;
}

message EnvelopeTriggerConfig {
  string source_ref = 1;
  string identity_ref = 2;
}

message SignalFingerprintConfig {
  uint32 version = 1;
  uint32 iterations = 2;
}

message SignalFingerprintInput {
  string local_id = 1;
  string local_key = 2;
  string remote_id = 3;
  string remote_key = 4;
  uint32 version = 5;
  uint32 iterations = 6;
}

message SignalFingerprintOutput {
  string display = 1;
  string scannable_hex = 2;
}

message SessionPrepareConfig {
  string identity_ref = 1;
}

message SessionPrepareInput {
  string identity_ref = 1;
}

message PreKeyBundle {
  string identity_ref = 1;
  string local_id = 2;
  uint32 device_id = 3;
  uint32 registration_id = 4;
  uint32 pre_key_id = 5;
  string pre_key = 6;
  uint32 signed_pre_key_id = 7;
  string signed_pre_key = 8;
  string signed_pre_key_signature = 9;
  uint32 kyber_pre_key_id = 10;
  string kyber_pre_key = 11;
  string kyber_pre_key_signature = 12;
  string identity_key = 13;
}

message SessionPrepareOutput {
  PreKeyBundle bundle = 1;
}

message SignalEncryptConfig {
  string identity_ref = 1;
}

message SignalEncryptInput {
  string identity_ref = 1;
  string remote_id = 2;
  uint32 remote_device_id = 3;
  PreKeyBundle remote_bundle = 4;
  bytes plaintext = 5;
}

message SignalEnvelope {
  string sender_id = 1;
  uint32 sender_device_id = 2;
  string recipient_id = 3;
  uint32 recipient_device_id = 4;
  string message_type = 5;
  bytes ciphertext = 6;
}

message SignalEncryptOutput {
  SignalEnvelope envelope = 1;
}

message SignalDecryptConfig {
  string identity_ref = 1;
  string required_principal = 2;
}

message SignalDecryptInput {
  string identity_ref = 1;
  string principal = 2;
  SignalEnvelope envelope = 3;
}

message SignalDecryptOutput {
  bool denied = 1;
  string error = 2;
  bytes plaintext = 3;
}

message AccountKeysConfig {
  string entropy_pool = 1;
  bytes aci = 2;
  string pin = 3;
  bytes pin_salt = 4;
  string pin_salt_username = 5;
  uint64 pin_salt_group_id = 6;
}

message AccountKeysInput {
  string entropy_pool = 1;
  bytes aci = 2;
  string pin = 3;
  bytes pin_salt = 4;
  string pin_salt_username = 5;
  uint64 pin_salt_group_id = 6;
}

message AccountKeysOutput {
  string entropy_pool = 1;
  bytes svr_key = 2;
  bytes backup_key = 3;
  bytes backup_id = 4;
  bytes pin_salt = 5;
  bytes pin_access_key = 6;
  bytes pin_encryption_key = 7;
}

message UsernameLinkCreateConfig {
  string username = 1;
  bytes entropy = 2;
}

message UsernameLinkCreateInput {
  string username = 1;
  bytes entropy = 2;
}

message UsernameLinkCreateOutput {
  bytes entropy = 1;
  bytes encrypted_username = 2;
  bytes link_buffer = 3;
}

message UsernameLinkDecryptConfig {
  bytes entropy = 1;
}

message UsernameLinkDecryptInput {
  bytes entropy = 1;
  bytes encrypted_username = 2;
  bytes link_buffer = 3;
}

message UsernameLinkDecryptOutput {
  string username = 1;
}

message OfficialServiceBoundaryConfig {
  string mode = 1;
  string upstream_tag = 2;
  string descriptor_checksum = 3;
  string account_secret_ref = 4;
  string egress_policy_ref = 5;
}

message ServiceTransportConfig {
  string transport_ref = 1;
  string mode = 2;
  string sandbox_endpoint = 3;
  repeated string requested_actions = 4;
  ApprovalPackage approval = 5;
}

message ApprovalPackage {
  string operator_approval_id = 1;
  string operator_approval_scope = 2;
  int64 operator_approval_expires_unix = 3;
  string service_authorization_type = 4;
  string service_authorization_evidence_ref = 5;
  int64 service_authorization_expires_unix = 6;
  string account_ref = 7;
  string account_consent_evidence_ref = 8;
  int64 account_consent_expires_unix = 9;
  string custody_backend = 10;
  string custody_key_handle_ref = 11;
  string custody_backup_ref = 12;
  string custody_rotation_ref = 13;
  bool abuse_idempotency_required = 14;
  string abuse_rate_limit_ref = 15;
  string abuse_recipient_allowlist_ref = 16;
  string abuse_declared_audience_ref = 17;
  string abuse_challenge_policy_ref = 18;
  string abuse_backoff_policy_ref = 19;
  repeated string egress_endpoint_allowlist = 20;
  string egress_tls_policy_ref = 21;
  bool egress_dry_run = 22;
  string audit_ref = 23;
  string audit_retention_ref = 24;
  string audit_redaction_ref = 25;
}

message KeyCustodyConfig {
  string custody_ref = 1;
  string account_ref = 2;
  repeated string secret_refs = 3;
  string non_exportable_key_ref = 4;
  bool allow_exportable_secret_refs = 5;
}

message PersistentCustodyConfig {
  string custody_ref = 1;
  string account_ref = 2;
  string backend = 3;
  string storage_path = 4;
  string key_handle = 5;
  string host_secret_ref = 6;
  bool allow_test_backend = 7;
}

message CustodyStoreConfig {
  string backend_id = 1;
  string backend = 2;
  string storage_path = 3;
  string kek_ref = 4;
  string kek_version = 5;
  uint32 schema_version = 6;
  bool allow_test_backend = 7;
}

message CustodyMetadata {
  string backend_id = 1;
  string ref_id = 2;
  uint32 schema_version = 3;
  string kek_ref = 4;
  string kek_version = 5;
  int64 created_at_unix = 6;
  int64 rotated_at_unix = 7;
  int64 revoked_at_unix = 8;
  string state = 9;
  string account_ref = 10;
  string device_ref = 11;
}

message CustodyCreateConfig {
  string store_ref = 1;
  string account_ref = 2;
}

message CustodyCreateInput {
  string store_ref = 1;
  string account_ref = 2;
  string device_ref = 3;
  repeated string material_refs = 4;
  string idempotency_key = 5;
  int64 requested_at_unix = 6;
}

message CustodyCreateOutput {
  string custody_ref = 1;
  CustodyMetadata metadata = 2;
  string audit_ref = 3;
}

message CustodyRotateConfig {
  string store_ref = 1;
}

message CustodyRotateInput {
  string custody_ref = 1;
  string new_kek_ref = 2;
  string new_kek_version = 3;
  int64 requested_at_unix = 5;
}

message CustodyRotateOutput {
  string custody_ref = 1;
  CustodyMetadata metadata = 2;
  string old_ref_state = 3;
  string audit_ref = 4;
}

message CustodyRestoreConfig {
  string store_ref = 1;
}

message CustodyRestoreInput {
  string custody_ref = 1;
  string sealed_bundle_ref = 2;
  string kek_ref = 3;
  string kek_version = 4;
}

message CustodyRestoreOutput {
  string custody_ref = 1;
  CustodyMetadata metadata = 2;
  string audit_ref = 3;
}

message CustodyRevokeConfig {
  string store_ref = 1;
}

message CustodyRevokeInput {
  string custody_ref = 1;
  int64 requested_at_unix = 3;
}

message CustodyRevokeOutput {
  string custody_ref = 1;
  CustodyMetadata metadata = 2;
  string audit_ref = 3;
}

message CustodyInspectConfig {
  string store_ref = 1;
}

message CustodyInspectInput {
  string custody_ref = 1;
}

message CustodyInspectOutput {
  string custody_ref = 1;
  CustodyMetadata metadata = 2;
}

message AccountRefConfig {
  string account_ref = 1;
  string device_ref = 2;
  string custody_ref = 3;
  string credential_ref = 4;
  string consent_ref = 5;
  string audit_ref = 6;
}

message ServiceContractCheckConfig {
  string mode = 1;
}

message ServiceContractCheckInput {
  string mode = 1;
}

message ServiceContractCheckOutput {
  string mode = 1;
  string upstream_tag = 2;
  string descriptor_checksum = 3;
  repeated string selected_domains = 4;
  bool live_service_disabled = 5;
}

message ServiceComplianceCheckConfig {
  string mode = 1;
  repeated string requested_actions = 2;
}

message ServiceComplianceCheckInput {
  string mode = 1;
  repeated string requested_actions = 2;
}

message ServiceComplianceCheckOutput {
  string mode = 1;
  bool approved = 2;
  bool live_service_disabled = 3;
  repeated string blocked_actions = 4;
  repeated string required_approvals = 5;
  repeated string deferred_domains = 6;
  string upstream_tag = 7;
  string descriptor_checksum = 8;
  string manifest_digest = 9;
  repeated string selected_domains = 10;
}

message ServicePolicyCheckConfig {
  string mode = 1;
  repeated string approvals = 2;
  repeated string requested_actions = 3;
}

message ServicePolicyCheckInput {
  string mode = 1;
  repeated string approvals = 2;
  repeated string requested_actions = 3;
}

message ServicePolicyCheckOutput {
  string mode = 1;
  bool approved = 2;
  bool live_service_disabled = 3;
  bool live_transport_allowed = 4;
  repeated string required_approvals = 5;
  repeated string missing_approvals = 6;
  repeated string blocked_actions = 7;
}

message ServiceApprovalValidateConfig {
  string mode = 1;
  repeated string requested_actions = 2;
  ApprovalPackage approval = 3;
}

message ServiceApprovalValidateInput {
  string mode = 1;
  repeated string requested_actions = 2;
  ApprovalPackage approval = 3;
}

message ServiceApprovalValidateOutput {
  string mode = 1;
  bool live_transport_allowed = 2;
  bool live_service_disabled = 3;
  repeated string denied_reasons = 4;
  repeated string requested_actions = 5;
}

message ServiceLiveSubmitConfig {
  string transport_ref = 1;
  string mode = 2;
  string sandbox_endpoint = 3;
  string account_ref = 4;
  bool expired_credentials = 5;
  ApprovalPackage approval = 6;
}

message ServiceLiveSubmitInput {
  string transport_ref = 1;
  string mode = 2;
  string sandbox_endpoint = 3;
  string operation = 4;
  string account_ref = 5;
  string device_ref = 6;
  string custody_ref = 7;
  string idempotency_key = 8;
  string username = 9;
  string link_code_ref = 10;
  string recipient_ref = 11;
  string payload_ref = 12;
  string cursor_ref = 13;
  string backup_ref = 14;
  string backup_id = 15;
  string challenge_ref = 16;
  string challenge_response_ref = 17;
  string consent_ref = 18;
  string audit_ref = 19;
  string credential_ref = 20;
  string non_exportable_key_ref = 21;
  bool expired_credentials = 22;
  ApprovalPackage approval = 23;
}

message ServiceSubmitOutput {
  string transport_ref = 1;
  string transport_mode = 2;
  string operation = 3;
  string account_ref = 4;
  string device_ref = 5;
  string request_id = 6;
  string status = 7;
  string challenge_ref = 8;
  map<string, string> secret_refs = 9;
  string credential_ref = 10;
  string audit_ref = 11;
  bool live_egress_attempted = 12;
  repeated string denied_reasons = 13;
}

message ServiceTestRegisterConfig {
  string account_ref = 1;
  bool expired_credentials = 2;
}

message ServiceTestRegisterInput {
  string account_ref = 1;
  string device_ref = 2;
  string custody_ref = 3;
  string idempotency_key = 4;
  string username = 5;
  string consent_ref = 6;
  string audit_ref = 7;
  string credential_ref = 8;
  string non_exportable_key_ref = 9;
  string challenge_ref = 10;
  bool expired_credentials = 11;
}

message ServiceTestLinkDeviceConfig {
  string account_ref = 1;
  bool expired_credentials = 2;
}

message ServiceTestLinkDeviceInput {
  string account_ref = 1;
  string device_ref = 2;
  string custody_ref = 3;
  string idempotency_key = 4;
  string link_code_ref = 5;
  string consent_ref = 6;
  string audit_ref = 7;
  string credential_ref = 8;
  string non_exportable_key_ref = 9;
  string challenge_ref = 10;
  bool expired_credentials = 11;
}

message ServiceTestSendConfig {
  string account_ref = 1;
  bool expired_credentials = 2;
}

message ServiceTestSendInput {
  string account_ref = 1;
  string device_ref = 2;
  string custody_ref = 3;
  string idempotency_key = 4;
  string recipient_ref = 5;
  string payload_ref = 6;
  string consent_ref = 7;
  string audit_ref = 8;
  string credential_ref = 9;
  string non_exportable_key_ref = 10;
  string challenge_ref = 11;
  bool expired_credentials = 12;
}

message ServiceTestReceiveConfig {
  string account_ref = 1;
  bool expired_credentials = 2;
}

message ServiceTestReceiveInput {
  string account_ref = 1;
  string device_ref = 2;
  string custody_ref = 3;
  string idempotency_key = 4;
  string cursor_ref = 5;
  string consent_ref = 6;
  string audit_ref = 7;
  string credential_ref = 8;
  string non_exportable_key_ref = 9;
  string challenge_ref = 10;
  bool expired_credentials = 11;
}

message ServiceTestOutput {
  string account_ref = 1;
  string device_ref = 2;
  string request_id = 3;
  string status = 4;
  string challenge_ref = 5;
  map<string, string> secret_refs = 6;
  string credential_ref = 7;
  string audit_ref = 8;
}

message ServiceEnvelopeTriggerConfig {
  string source_ref = 1;
  string boundary_ref = 2;
}
